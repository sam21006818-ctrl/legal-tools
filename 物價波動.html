<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程物價爭議：司法裁量模擬器</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input, select { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; font-size: 18px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .result-box { display: flex; justify-content: space-between; margin-top: 30px; gap: 20px; }
        .card { flex: 1; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fafafa; }
        .card h3 { margin-top: 0; color: #2c3e50; font-size: 18px; text-align: center;}
        .highlight-win { color: #27ae60; font-size: 20px; font-weight: bold; }
        .highlight-lose { color: #c0392b; font-size: 20px; font-weight: bold; }
        .summary { text-align: center; margin-top: 20px; font-size: 18px; font-weight: bold; padding: 15px; background: #fff3cd; border-left: 5px solid #ffc107; border-radius: 4px;}
    </style>
</head>
<body>

<div class="container">
    <h1>⚖️ 工程物價爭議：司法裁量模擬器</h1>
    <p style="text-align: center; color: #7f8c8d;">輸入您的工程數據，立即預覽在最高法院兩套不同標準下的「獲賠金額」與「自負虧損」。</p>

    <div class="input-group">
        <label for="budget">原物料預算金額 (新臺幣)</label>
        <input type="number" id="budget" value="10000000" min="0">
    </div>

    <div class="input-group">
        <label for="actual">實際進貨成本 (新臺幣)</label>
        <input type="number" id="actual" value="15000000" min="0">
    </div>

    <div class="input-group">
        <label for="threshold">物價忍受門檻 (政府物調標準)</label>
        <select id="threshold">
            <select id="threshold">
            <option value="2.5">總指數門檻 2.5%</option>
            <option value="5">中分類指數門檻 5%</option>
            <option value="10" selected>特定項目門檻 10% (如鋼筋/鋼板)</option>
        </select>
    </div>

    <button onclick="calculate()">執行模擬計算</button>

    <div class="summary" id="summary" style="display:none;">
        實際超支總成本：<span id="total-extra" style="color:#e74c3c;">0</span> 元
    </div>

    <div class="result-box" id="result-box" style="display:none;">
        <div class="card" style="border-top: 5px solid #2980b9;">
            <h3>標準 A：客觀門檻法 (皆豪案)</h3>
            <p style="font-size: 14px; color: #7f8c8d;">邏輯：跨越門檻的損失，機關全額補貼，並加計5%稅管費。</p>
            <hr>
            <p>機關判賠金額：<br><span class="highlight-win" id="compA">0</span> 元</p>
            <p>廠商自負虧損：<br><span class="highlight-lose" id="lossA">0</span> 元</p>
        </div>

        <div class="card" style="border-top: 5px solid #f39c12;">
            <h3>標準 B：衡平分攤法 (遠揚案)</h3>
            <p style="font-size: 14px; color: #7f8c8d;">邏輯：不看指數門檻，認定雙方無過失，總超支費用一人一半。</p>
            <hr>
            <p>機關判賠金額：<br><span class="highlight-win" id="compB">0</span> 元</p>
            <p>廠商自負虧損：<br><span class="highlight-lose" id="lossB">0</span> 元</p>
        </div>
    </div>
</div>

<script>
    function formatMoney(num) {
        return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function calculate() {
        const budget = parseFloat(document.getElementById('budget').value) || 0;
        const actual = parseFloat(document.getElementById('actual').value) || 0;
        const threshold = parseFloat(document.getElementById('threshold').value) / 100;

        const extraCost = actual - budget;
        
        if (extraCost <= 0) {
            alert("實際成本並未超支，不構成情事變更！");
            return;
        }

        document.getElementById('summary').style.display = 'block';
        document.getElementById('result-box').style.display = 'flex';
        document.getElementById('total-extra').innerText = formatMoney(extraCost);

        // 標準 A 計算 (皆豪案)
        let compA = 0;
        const thresholdCost = budget * (1 + threshold);
        if (actual > thresholdCost) {
            compA = (actual - thresholdCost) * 1.05; // 扣除門檻後全賠，加計5%稅利
        }
        let lossA = extraCost - compA;
        if (lossA < 0) lossA = 0;

        // 標準 B 計算 (遠揚案)
        const compB = extraCost * 0.5; // 一人一半
        const lossB = extraCost * 0.5;

        // 更新 UI
        document.getElementById('compA').innerText = formatMoney(compA);
        document.getElementById('lossA').innerText = formatMoney(lossA);
        document.getElementById('compB').innerText = formatMoney(compB);
        document.getElementById('lossB').innerText = formatMoney(lossB);
    }
</script>

</body>
</html>
