<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏳ 情事變更權利壽命：除斥期間時光機</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #34495e; padding-bottom: 10px; }
        .description { text-align: center; color: #7f8c8d; margin-bottom: 20px; line-height: 1.5; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input[type="date"] { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; font-size: 18px; background-color: #34495e; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #2c3e50; }
        .result-box { display: flex; gap: 20px; margin-top: 25px; display: none; }
        .card { flex: 1; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fafafa; text-align: center; }
        .card h3 { margin-top: 0; color: #2c3e50; }
        .status-win { color: #27ae60; font-size: 24px; font-weight: bold; margin: 15px 0; display: block;}
        .status-lose { color: #c0392b; font-size: 24px; font-weight: bold; margin: 15px 0; display: block;}
        .time-passed { font-size: 18px; color: #e67e22; font-weight: bold; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⏳ 情事變更權利壽命：除斥期間時光機</h1>
    <div class="description">
        展示最高法院對於民法第227-2條「權利行使期限」的兩極化見解。<br>
        輸入工程驗收日與實際起訴日，看看您的案件在不同法庭上的生死結局。
    </div>

    <div class="input-group">
        <label for="acceptDate">工程正式「驗收完畢」日期：</label>
        <input type="date" id="acceptDate" value="2009-02-20">
    </div>

    <div class="input-group">
        <label for="lawsuitDate">向法院「遞狀起訴」日期：</label>
        <input type="date" id="lawsuitDate" value="2012-01-18">
    </div>

    <button onclick="calculateTime()">執行法理時效檢驗</button>

    <div class="time-passed" id="time-passed" style="display:none;"></div>

    <div class="result-box" id="result-box">
        <div class="card" style="border-top: 5px solid #c0392b;">
            <h3>標準 A：嚴格派 (2年定生死)</h3>
            <p style="font-size: 13px; color: #7f8c8d;">最高法院 108 台上 931 裁定<br>從驗收日直接起算 2 年</p>
            <span id="statusA"></span>
            <p id="descA" style="font-size: 14px;"></p>
        </div>

        <div class="card" style="border-top: 5px solid #27ae60;">
            <h3>標準 B：寬鬆派 (4年猶豫期)</h3>
            <p style="font-size: 13px; color: #7f8c8d;">最高法院 107 台上 839 判決<br>原2年時效走完，再加 2 年</p>
            <span id="statusB"></span>
            <p id="descB" style="font-size: 14px;"></p>
        </div>
    </div>
</div>

<script>
    function calculateTime() {
        const acceptDate = new Date(document.getElementById('acceptDate').value);
        const lawsuitDate = new Date(document.getElementById('lawsuitDate').value);
        
        if (isNaN(acceptDate) || isNaN(lawsuitDate)) {
            alert("請選擇正確的日期！"); return;
        }

        const diffTime = Math.abs(lawsuitDate - acceptDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const diffYears = (diffDays / 365.25).toFixed(1);

        document.getElementById('time-passed').style.display = 'block';
        document.getElementById('result-box').style.display = 'flex';
        document.getElementById('time-passed').innerText = `自驗收至起訴，共歷時：${diffYears} 年 (${diffDays} 天)`;

        // 標準A：2年 (730天)
        if (diffYears <= 2.0) {
            document.getElementById('statusA').className = 'status-win';
            document.getElementById('statusA').innerText = '✅ 合法受理';
            document.getElementById('descA').innerText = '未逾2年除斥期間，法官將進行實體審理。';
        } else {
            document.getElementById('statusA').className = 'status-lose';
            document.getElementById('statusA').innerText = '❌ 駁回起訴';
            document.getElementById('descA').innerText = '已逾2年期限！權利消滅，一毛錢都拿不到。';
        }

        // 標準B：4年 (1460天)
        if (diffYears <= 4.0) {
            document.getElementById('statusB').className = 'status-win';
            document.getElementById('statusB').innerText = '✅ 合法受理';
            document.getElementById('descB').innerText = '未逾4年寬鬆期限，法官將進行實體審理。';
        } else {
            document.getElementById('statusB').className = 'status-lose';
            document.getElementById('statusB').innerText = '❌ 駁回起訴';
            document.getElementById('descB').innerText = '拖太久了！連最寬鬆的4年期限都已超過。';
        }
    }
</script>

</body>
</html>
